[package]
name = "sweetbyte-rs"
version = "26.1.0"
edition = "2024"
description = "A very small, very simple, yet very secure encryption tool written in rust."
license = "MIT"
authors = ["Ilham Putra Husada <hambosto@gmail.com>"]
readme = "README.md"
keywords = ["encryption", "security", "crypto", "aes", "chacha20"]
categories = ["cryptography", "command-line-utilities"]
homepage = "https://github.com/hambosto/sweetbyte-rs"
repository = "https://github.com/hambosto/sweetbyte-rs"

[dependencies]
aes-gcm            = { version = "0.10.3", features = ["std", "zeroize"] }
anyhow             = "1.0.102"
argon2             = { version = "0.5.3", features = ["std", "zeroize"] }
blake3             = { version = "1.8.3", features = ["zeroize"] }
block-padding      = "0.4.2"
bytemuck           = { version = "1.25.0", features = ["derive"] }
bytes              = "1.11.1"
bytesize           = "2.3.1"
chacha20poly1305   = { version = "0.10.1", features = ["std"] }
clap               = { version = "4.5.60", features = ["derive"] }
comfy-table        = "7.2.2"
console            = "0.16.2"
crc32fast          = "1.5.0"
fast-glob          = "1.0.1"
figlet-rs          = "0.1.5"
hashbrown          = "0.16.1"
hex                = "0.4.3"
hmac               = "0.12.1"
indicatif          = "0.18.4"
inquire            = "0.9.4"
mimalloc           = { version = "0.1.48", features = ["v3"] }
postcard           = { version = "1.1.3", features = ["alloc"] }
rand               = "0.10.0"
reed-solomon-simd  = "3.1.0"
serde              = { version = "1.0.228", features = ["derive"] }
sha2               = "0.10.9"
strum              = { version = "0.28.0", features = ["derive"] }
subtle             = "2.6.1"
tokio              = { version = "1.50.0", features = ["full"] }
tracing            = "0.1.44"
tracing-subscriber = "0.3.22"
walkdir            = "2.5.0"
zeroize            = "1.8.2"
zstd               = { version = "0.13.3", features = ["thin"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[dev-dependencies]
tempfile = "3.26.0"

[lints.clippy]
all = "warn"
pedantic = "warn"
