[package]
name = "sweetbyte-rs"
version = "24.11.2025"
authors = ["Ilham Putra Husada <hambosto@gmail.com>"]
description = "A modern, terminal-based file encryption tool"
keywords = ["encryption", "decryption", "compression", "decompression"]
categories = ["command-line-utilities"]
repository = "https://github.com/hambosto/sweetbyte-rs"
homepage = "https://github.com/hambosto/sweetbyte-rs"
readme = "README.md"
license = "MIT"
edition = "2024"

[dependencies]
aes-gcm = { version = "0.10.3", features = ["aes"] }
chacha20poly1305 = { version = "0.10.1", features = ["std"] }
argon2 = "0.5.3"
hmac = "0.12.1"
sha2 = "0.10.9"
rand = "0.9.2"
reed-solomon-erasure = { version = "6.0.0", features = ["simd-accel"] }
mimalloc = { version = "0.1.48", features = ["v3"] }
inquire = "0.9.1"
indicatif = "0.18.3"
console = "0.16.1"
comfy-table = "7.2.1"
figlet-rs = "0.1.5"
anyhow = "1.0.100"
byteorder = "1.5.0"
walkdir = "2.5.0"
subtle = "2.6.1"
num_cpus = "1.17.0"
crossbeam-channel = "0.5.15"
flate2 = "1.1.5"
parking_lot = "0.12.5"

[profile.release]
codegen-units = 1
lto = true
panic = "abort"
strip = true
opt-level = 3
