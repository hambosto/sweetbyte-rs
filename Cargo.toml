[package]
name = "sweetbyte-rs"
version = "26.1.0"
edition = "2024"
description = "A very small, very simple, yet very secure encryption tool written in rust."
license = "MIT"
authors = ["Ilham Putra Husada <hambosto@gmail.com>"]
readme = "README.md"
keywords = ["encryption", "security", "crypto", "aes", "chacha20"]
categories = ["cryptography", "command-line-utilities"]
homepage = "https://github.com/hambosto/sweetbyte-rs"
repository = "https://github.com/hambosto/sweetbyte-rs"

[dependencies]
anyhow             = "1.0.102"
argon2             = { version = "0.5.3", features = ["std", "zeroize"] }
blake3             = { version = "1.8.4", features = ["zeroize"] }
block-padding      = "0.4.2"
bytemuck           = { version = "1.25.0", features = ["derive"] }
bytesize           = "2.3.1"
clap               = { version = "4.6.0", features = ["derive"] }
comfy-table        = "7.2.2"
console            = "0.16.3"
crc32fast          = "1.5.0"
fast-glob          = "1.0.1"
figlet-rs          = "1.0.0"
hashbrown          = "0.17.0"
hex                = "0.4.3"
indicatif          = "0.18.4"
inquire            = "0.9.4"
mimalloc           = { version = "0.1.48", features = ["v3"] }
postcard           = { version = "1.1.3", features = ["alloc"] }
reed-solomon-simd  = "3.1.0"
ring               = { version = "0.17.14", features = ["std"] }
serde              = { version = "1.0.228", features = ["derive"] }
strum              = { version = "0.28.0", features = ["derive"] }
subtle             = "2.6.1"
tokio              = { version = "1.52.0", features = ["full"] }
walkdir            = "2.5.0"
zeroize            = "1.8.2"
zstd               = { version = "0.13.3", features = ["thin"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[dev-dependencies]
tempfile = "3.27.0"

[lints.clippy]
all = "warn"
pedantic = "warn"
