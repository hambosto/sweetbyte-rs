[package]
name = "sweetbyte-rs"
version = "26.1.0"
edition = "2024"
description = "A very small, very simple, yet very secure encryption tool written in rust."
license = "MIT"
authors = ["Ilham Putra Husada <hambosto@gmail.com>"]
readme = "README.md"
keywords = ["encryption", "security", "crypto", "aes", "chacha20"]
categories = ["cryptography", "command-line-utilities"]
homepage = "https://github.com/hambosto/sweetbyte-rs"
repository = "https://github.com/hambosto/sweetbyte-rs"

[dependencies]
aes-gcm           = { version = "0.10.3", features = ["std"] }
anyhow            = "1.0.102"
argon2            = { version = "0.5.3", features = ["std"] }
blake3            = "1.8.5"
block-padding     = "0.4.2"
bytemuck          = { version = "1.25.0", features = ["derive"] }
byteorder         = "1.5.0"
chacha20poly1305  = { version = "0.10.1", features = ["std"] }
cliclack          = "0.5.4"
comfy-table       = "7.2.2"
crc32fast         = "1.5.0"
fast-glob         = "1.0.1"
hex               = "0.4.3"
hmac              = "0.13.0"
humansize         = "2.1.3"
mimalloc          = { version = "0.1.48", features = ["v3"] }
postcard          = { version = "1.1.3", features = ["alloc"] }
rand              = "0.10.1"
reed-solomon-simd = "3.1.0"
secrecy           = "0.10.3"
serde             = "1.0.228"
sha2              = "0.11.0"
strum             = { version = "0.28.0", features = ["derive"] }
subtle            = "2.6.1"
tokio             = { version = "1.52.1", features = ["full"] }
walkdir           = "2.5.0"
zeroize           = "1.8.2"
zstd              = { version = "0.13.3", features = ["thin"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[dev-dependencies]
tempfile = "3.27.0"
