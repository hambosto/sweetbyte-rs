[package]
name = "sweetbyte-rs"
version = "24.11.2025"
authors = ["Ilham Putra Husada <hambosto@gmail.com>"]
description = "A modern, terminal-based file encryption tool"
keywords = ["encryption", "terminal", "time", "cli", "date"]
categories = ["command-line-utilities"]
repository = "https://github.com/hambosto/sweetbyte-rs"
homepage = "https://github.com/hambosto/sweetbyte-rs"
readme = "README.md"
license = "MIT"
edition = "2024"

[dependencies]
aes-gcm = "0.10.3"
chacha20poly1305 = "0.10.1"
argon2 = "0.5.3"
hmac = "0.12.1"
sha2 = "0.10.9"
rand = "0.9.2"
reed-solomon-erasure = "6.0.0"
flate2 = "1.1.5"
clap = { version = "4.5.53", features = ["derive"] }
inquire = "0.9.1"
indicatif = "0.18.3"
console = "0.16.1"
anyhow = "1.0.100"
crossbeam-channel = "0.5.15"
byteorder = "1.5.0"
walkdir = "2.5.0"
subtle = "2.6.1"
num_cpus = "1.17.0"
tokio = { version = "1.48.0", features = ["full"] }
figlet-rs = "0.1.5"

[profile.release]
codegen-units = 1
lto = true
panic = "abort"
strip = true
