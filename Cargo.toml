[package]
name = "sweetbyte"
version = "1.0.0"
edition = "2021"
authors = ["SweetByte Contributors"]
description = "A resilient, secure, and efficient file encryption tool"
license = "MIT"

[lib]
name = "sweetbyte"
path = "src/lib.rs"

[[bin]]
name = "sweetbyte"
path = "src/main.rs"

[dependencies]
aes-gcm = "0.10.3"
chacha20poly1305 = "0.10.1"
argon2 = "0.5.3"
hmac = "0.12.1"
sha2 = "0.10.9"
rand = "0.9.2"
reed-solomon-erasure = "6.0.0"
flate2 = "1.1.5"
clap = { version = "4.5.53", features = ["derive"] }
inquire = "0.9.1"
indicatif = "0.18.3"
console = "0.16.1"
anyhow = "1.0.100"
crossbeam-channel = "0.5.15"
byteorder = "1.5.0"
walkdir = "2.5.0"
subtle = "2.6.1"
num_cpus = "1.17.0"
tokio = { version = "1.48.0", features = ["full"] }
figlet-rs = "0.1.5"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
